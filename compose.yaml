# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

services:
  # Here the instructions define your application as a service called "server".
  # This service is built from the Dockerfile in the current directory.
  # You can add other services your application may depend on here, such as a
  # database or a cache. For examples, see the Awesome Compose repository:
  # https://github.com/docker/awesome-compose
  file-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-stage
    ports:
      - 8080:8080
    networks:
      app-network:
    volumes:
      - ./tmp-storage:/app/storage:rw
      # Mount file config dùng chung từ thư mục gốc
      - ./application.yml:/app/config/application.yml:ro
      - ./application-api.yml:/app/config/application-api.yml:ro
      - ./logback-spring.xml:/app/config/logback-spring.xml:ro
    environment:
      - SPRING_PROFILES_ACTIVE=api
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_started
      mongodb:
        condition: service_started

  # Here the instructions define your application as a service called "server".
  # This service is built from the Dockerfile in the current directory.
  # You can add other services your application may depend on here, such as a
  # database or a cache. For examples, see the Awesome Compose repository:
  # https://github.com/docker/awesome-compose
  file-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker-stage
    restart: always
    tty: true
    stdin_open: true
    networks:
      app-network:
    volumes:
      - ./tmp-storage:/app/storage:rw
      # Mount file config dùng chung từ thư mục gốc
      - ./application.yml:/app/config/application.yml:ro
      - ./application-worker.yml:/app/config/application-worker.yml:ro
      - ./logback-spring.xml:/app/config/logback-spring.xml:ro
    environment:
      - SPRING_PROFILES_ACTIVE=worker
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_CONFIG_ADDITIONAL_LOCATION=file:/app/config/application.yml,file:/app/config/application-worker.yml
    depends_on:
      redis:
        condition: service_started
      mongodb:
        condition: service_started

  # Infrastructure Service: Redis for message queue and state management
  redis:
    image: redis:7-alpine
    container_name: kingkong-redis
    networks:
      app-network:
        aliases:
          - redis
    ports:
      - 6379:6379
    command: ["redis-server", "--bind", "0.0.0.0", "--appendonly", "yes"]

  # Infrastructure Service: MongoDB for file metadata storage
  mongodb:
    image: mongo:7.0
    container_name: kingkong-mongodb
    ports:
      - 27017:27017
    networks:
      - app-network
    volumes:
      - mongo-data:/data/db

networks:
  app-network:
    driver: bridge
volumes:
  mongo-data:
